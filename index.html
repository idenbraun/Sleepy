<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1a3e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sleepy">
<title>Sleepy — таймер сна</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html {
    scrollbar-width: thin;
    scrollbar-color: rgba(167,139,250,0.3) transparent;
  }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(167,139,250,0.3);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(167,139,250,0.5); }
  
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #24243e 100%);
    color: #fff;
    overflow-x: hidden;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  
  *:focus-visible {
    outline: 2px solid #a78bfa;
    outline-offset: 2px;
  }
  
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 3s infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }
  
  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }
  
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo {
    font-size: 14px;
    letter-spacing: 4px;
    color: #a78bfa;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 {
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 300;
    background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .subtitle {
    color: rgba(255,255,255,0.6);
    font-size: 16px;
    font-weight: 300;
  }
  
  .big-clock {
    text-align: center;
    margin: 40px 0;
  }
  .clock-time {
    font-size: clamp(64px, 12vw, 96px);
    font-weight: 400;
    color: #fff;
    letter-spacing: 4px;
    text-shadow: 0 0 40px rgba(167,139,250,0.3);
  }
  
  .mode-toggle {
    display: flex;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 4px;
    margin: 0 auto 32px;
    max-width: 500px;
    position: relative;
  }
  .mode-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.6);
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    z-index: 1;
  }
  .mode-btn.active {
    background: rgba(167,139,250,0.2);
    color: #fff;
    box-shadow: 0 4px 12px rgba(139,92,246,0.3);
  }
  
  .time-picker {
    background: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: none;
    border-radius: 0;
    padding: 16px 0;
    margin-bottom: 32px;
    text-align: center;
  }
  .time-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .time-input {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 16px 24px;
    font-size: 48px;
    font-weight: 200;
    color: #fff;
    width: 130px;
    text-align: center;
    outline: none;
    transition: all 0.3s;
    caret-color: #a78bfa;
    font-family: inherit;
  }
  .time-input:focus {
    border-color: #a78bfa;
    box-shadow: 0 0 20px rgba(167,139,250,0.3);
  }
  .time-sep {
    font-size: 48px;
    font-weight: 200;
    color: rgba(255,255,255,0.4);
  }
  
  .presets {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .preset {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    padding: 8px 16px;
    border-radius: 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .preset:hover {
    background: rgba(167,139,250,0.2);
    border-color: #a78bfa;
    color: #fff;
  }
  
  .options-title {
    text-align: center;
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
  }
  .card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 36px 24px 24px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(167,139,250,0.1));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(167,139,250,0.4);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  .card:hover::before { opacity: 1; }
  
  .card.best {
    border-color: rgba(167,139,250,0.3);
    background: linear-gradient(135deg, rgba(167,139,250,0.1), rgba(139,92,246,0.05));
  }
  .card.best::after {
    content: '✨ идеально';
    position: absolute;
    top: 12px; right: 16px;
    font-size: 11px;
    color: #c4b5fd;
    letter-spacing: 1px;
  }
  
  .card.highlight {
    border-color: rgba(34,197,94,0.5);
    background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(16,185,129,0.08));
    animation: pulse 2s ease-in-out infinite;
  }
  .card.highlight::after {
    content: '🔥 ложись сейчас!';
    position: absolute;
    top: 12px; right: 16px;
    font-size: 11px;
    color: #86efac;
    letter-spacing: 1px;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(34,197,94,0.3); }
    50% { box-shadow: 0 0 30px rgba(34,197,94,0.5); }
  }
  
  .card-time {
    font-size: 36px;
    font-weight: 200;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }
  .card-cycles {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }
  .card-duration {
    display: inline-block;
    background: rgba(255,255,255,0.08);
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    position: relative;
    z-index: 1;
  }
  .card-desc {
    margin-top: 12px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
    position: relative;
    z-index: 1;
  }
  
  .reminder-btn {
    display: none;
    margin: 32px auto 0;
    padding: 12px 24px;
    background: rgba(34,197,94,0.2);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 12px;
    color: #86efac;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reminder-btn.visible { display: block; }
  .reminder-btn:hover {
    background: rgba(34,197,94,0.3);
    border-color: rgba(34,197,94,0.5);
  }
  
  .footer-note {
    text-align: center;
    margin-top: 40px;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    line-height: 1.6;
  }
  
  /* Мобильная версия */
  @media (max-width: 600px) {
    .container {
      padding: 40px 16px 60px;
    }
    
    .header {
      margin-bottom: 24px;
    }
    
    .big-clock {
      margin: 24px 0;
    }
    
    .mode-toggle {
      margin-bottom: 24px;
    }
    
    .presets {
      gap: 8px;
    }
    .preset {
      flex: 0 0 calc(33.333% - 6px);
      padding: 10px 8px;
      font-size: 14px;
    }
    
    .options {
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .card {
      padding: 28px 10px 10px;
      border-radius: 12px;
    }
    .card-time {
      font-size: 22px;
      margin-bottom: 2px;
    }
    .card-cycles {
      font-size: 10px;
      margin-bottom: 6px;
    }
    .card-duration {
      font-size: 10px;
      padding: 3px 8px;
    }
    .card-desc {
      display: none;
    }
    .card.best::after,
    .card.highlight::after {
      font-size: 9px;
      top: 8px;
      right: 8px;
    }
    
    .options-title {
      margin-bottom: 12px;
      font-size: 11px;
    }
    
    .footer-note {
      margin-top: 24px;
      font-size: 11px;
    }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container" role="main">
  <header class="header">
    <div class="logo" aria-label="Sleepy">🌙 Sleepy</div>
    <h1>Просыпайся легко</h1>
    <p class="subtitle">Цикл сна длится ~90 минут. Ложись так, чтобы проснуться между циклами — и будильник не будет врагом.</p>
  </header>

  <div class="big-clock" aria-live="polite">
    <div class="clock-time" id="bigClock">—</div>
  </div>

  <div class="mode-toggle" role="tablist" aria-label="Выбор режима">
    <button class="mode-btn active" id="modeWake" role="tab" aria-selected="true" aria-controls="panelWake">
      Хочу проснуться в
    </button>
    <button class="mode-btn" id="modeSleep" role="tab" aria-selected="false" aria-controls="panelSleep">
      Ложусь сейчас
    </button>
  </div>

  <div id="panelWake" role="tabpanel" aria-labelledby="modeWake">
    <div class="time-picker">
      <div class="time-display">
        <input type="text" inputmode="numeric" pattern="[0-9]*" id="hours" class="time-input" maxlength="2" value="07" aria-label="Часы пробуждения">
        <span class="time-sep" aria-hidden="true">:</span>
        <input type="text" inputmode="numeric" pattern="[0-9]*" id="minutes" class="time-input" maxlength="2" value="00" aria-label="Минуты пробуждения">
      </div>
      <div class="presets" role="group" aria-label="Быстрый выбор времени">
        <button class="preset" data-h="6" data-m="0">6:00</button>
        <button class="preset" data-h="6" data-m="30">6:30</button>
        <button class="preset" data-h="7" data-m="0">7:00</button>
        <button class="preset" data-h="7" data-m="30">7:30</button>
        <button class="preset" data-h="8" data-m="0">8:00</button>
        <button class="preset" data-h="9" data-m="0">9:00</button>
      </div>
    </div>
  </div>

  <div id="panelSleep" role="tabpanel" aria-labelledby="modeSleep" hidden></div>

  <div class="options-title" id="optionsTitle">Варианты, когда лечь</div>
  <div class="options" id="options" role="list"></div>

  <button class="reminder-btn" id="reminderBtn" aria-label="Установить напоминание">🔔 Напомнить, когда пора ложиться</button>

  <footer class="footer-note">
    +15 минут закладываем на засыпание · 5–6 циклов = 7.5–9 часов сна<br>
    Если просыпаешься в конце цикла — голова свежая, а не ватная
  </footer>
</div>

<script>
  // PWA манифест
  const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
    <rect width="192" height="192" rx="40" fill="#1a1a3e"/>
    <path d="M120 96 A44 44 0 1 1 96 52 A36 36 0 0 0 120 96Z" fill="#c4b5fd"/>
    <circle cx="140" cy="60" r="3" fill="#fff" opacity="0.8"/>
    <circle cx="155" cy="85" r="2" fill="#fff" opacity="0.6"/>
    <circle cx="50" cy="140" r="2" fill="#fff" opacity="0.7"/>
  </svg>`;
  const iconDataUri = 'data:image/svg+xml;base64,' + btoa(iconSvg);
  
  const manifest = {
    name: "Sleepy — таймер сна",
    short_name: "Sleepy",
    description: "Просыпайся в правильной фазе сна",
    start_url: ".",
    display: "standalone",
    orientation: "portrait",
    background_color: "#0f0c29",
    theme_color: "#1a1a3e",
    icons: [
      { src: iconDataUri, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
      { src: iconDataUri, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const manifestLink = document.createElement('link');
  manifestLink.rel = 'manifest';
  manifestLink.href = URL.createObjectURL(manifestBlob);
  document.head.appendChild(manifestLink);
  
  const appleIcon = document.createElement('link');
  appleIcon.rel = 'apple-touch-icon';
  appleIcon.href = iconDataUri;
  document.head.appendChild(appleIcon);

  // Service Worker
  const swCode = `
    const CACHE_NAME = 'sleepy-v1';
    const urlsToCache = ['/'];
    
    self.addEventListener('install', event => {
      event.waitUntil(
        caches.open(CACHE_NAME)
          .then(cache => cache.addAll(urlsToCache))
      );
    });
    
    self.addEventListener('fetch', event => {
      event.respondWith(
        caches.match(event.request)
          .then(response => response || fetch(event.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(swUrl).catch(err => {
      console.log('SW registration failed:', err);
    });
  }

  // Звёзды
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.opacity = Math.random();
    starsEl.appendChild(s);
  }

  const FALL_ASLEEP_MIN = 15;
  const CYCLE_MIN = 90;

  const hoursInput = document.getElementById('hours');
  const minutesInput = document.getElementById('minutes');
  const optionsEl = document.getElementById('options');
  const optionsTitle = document.getElementById('optionsTitle');
  const bigClock = document.getElementById('bigClock');
  const reminderBtn = document.getElementById('reminderBtn');
  const modeWake = document.getElementById('modeWake');
  const modeSleep = document.getElementById('modeSleep');
  const panelWake = document.getElementById('panelWake');
  const panelSleep = document.getElementById('panelSleep');

  let currentMode = 'wake';
  let currentWakeTime = { h: 7, m: 0 };
  let reminderTimeout = null;

  function pad(n) { return n.toString().padStart(2, '0'); }

  function calcBedOptions(wakeH, wakeM) {
    const wakeTotal = wakeH * 60 + wakeM;
    const results = [];
    
    for (let cycles = 3; cycles <= 7; cycles++) {
      const sleepStart = wakeTotal - cycles * CYCLE_MIN;
      const bedTime = sleepStart - FALL_ASLEEP_MIN;
      
      let bed = ((bedTime % (24 * 60)) + 24 * 60) % (24 * 60);
      const bedH = Math.floor(bed / 60);
      const bedM = bed % 60;
      
      const totalSleep = cycles * CYCLE_MIN;
      const sleepH = Math.floor(totalSleep / 60);
      const sleepM = totalSleep % 60;
      
      let rating, desc;
      if (cycles === 6) {
        rating = 'best';
        desc = 'Золотой стандарт. 9 часов — проснёшься бодрым и выспавшимся.';
      } else if (cycles === 5) {
        rating = 'good';
        desc = 'Оптимально для большинства. 7.5 часов — классика.';
      } else if (cycles === 4) {
        rating = 'ok';
        desc = 'Минимум для взрослого. Если совсем дедлайн.';
      } else if (cycles === 7) {
        rating = 'good';
        desc = 'Для тех, кто любит поспать подольше. 10.5 часов.';
      } else {
        rating = 'low';
        desc = 'Маловато. Только если это разовая история.';
      }
      
      results.push({
        cycles, bedH, bedM, sleepH, sleepM, rating, desc,
        timeStr: pad(bedH) + ':' + pad(bedM),
        timeTotal: bedH * 60 + bedM
      });
    }
    
    results.sort((a, b) => b.cycles - a.cycles);
    
    return results;
  }

  function calcWakeOptions() {
    const now = new Date();
    const nowTotal = now.getHours() * 60 + now.getMinutes() + FALL_ASLEEP_MIN;
    const results = [];
    
    for (let cycles = 3; cycles <= 7; cycles++) {
      const wakeTime = nowTotal + cycles * CYCLE_MIN;
      let wake = ((wakeTime % (24 * 60)) + 24 * 60) % (24 * 60);
      const wakeH = Math.floor(wake / 60);
      const wakeM = wake % 60;
      
      const totalSleep = cycles * CYCLE_MIN;
      const sleepH = Math.floor(totalSleep / 60);
      const sleepM = totalSleep % 60;
      
      let rating, desc;
      if (cycles === 6) {
        rating = 'best';
        desc = 'Золотой стандарт. 9 часов — проснёшься бодрым и выспавшимся.';
      } else if (cycles === 5) {
        rating = 'good';
        desc = 'Оптимально для большинства. 7.5 часов — классика.';
      } else if (cycles === 4) {
        rating = 'ok';
        desc = 'Минимум для взрослого. Если совсем дедлайн.';
      } else if (cycles === 7) {
        rating = 'good';
        desc = 'Для тех, кто любит поспать подольше. 10.5 часов.';
      } else {
        rating = 'low';
        desc = 'Маловато. Только если это разовая история.';
      }
      
      results.push({
        cycles, wakeH, wakeM, sleepH, sleepM, rating, desc,
        timeStr: pad(wakeH) + ':' + pad(wakeM),
        timeTotal: wakeH * 60 + wakeM
      });
    }
    
    results.sort((a, b) => b.cycles - a.cycles);
    
    return results;
  }

  function highlightBestOption(options) {
    const now = new Date();
    const nowTotal = now.getHours() * 60 + now.getMinutes();
    
    options.forEach(opt => {
      const diff = Math.abs(opt.timeTotal - nowTotal);
      if (diff <= 30) {
        opt.highlight = true;
      }
    });
  }

  function render() {
    let options;
    
    if (currentMode === 'wake') {
      const h = parseInt(hoursInput.value) || 0;
      const m = parseInt(minutesInput.value) || 0;
      currentWakeTime = { h, m };
      options = calcBedOptions(h, m);
      optionsTitle.textContent = 'Варианты, когда лечь';
    } else {
      options = calcWakeOptions();
      optionsTitle.textContent = 'Варианты, когда проснуться';
    }
    
    highlightBestOption(options);
    
    optionsEl.innerHTML = options.map(o => `
      <div class="card ${o.rating === 'best' ? 'best' : ''} ${o.highlight ? 'highlight' : ''}" role="listitem">
        <div class="card-time">${o.timeStr}</div>
        <div class="card-cycles">${o.cycles} циклов сна</div>
        <div class="card-duration">💤 ${o.sleepH}ч ${o.sleepM}мин</div>
        <div class="card-desc">${o.desc}</div>
      </div>
    `).join('');
  }

  function updateClock() {
    const d = new Date();
    bigClock.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  function switchMode(mode) {
    currentMode = mode;
    
    if (mode === 'wake') {
      modeWake.classList.add('active');
      modeWake.setAttribute('aria-selected', 'true');
      modeSleep.classList.remove('active');
      modeSleep.setAttribute('aria-selected', 'false');
      panelWake.hidden = false;
      panelSleep.hidden = true;
    } else {
      modeSleep.classList.add('active');
      modeSleep.setAttribute('aria-selected', 'true');
      modeWake.classList.remove('active');
      modeWake.setAttribute('aria-selected', 'false');
      panelSleep.hidden = false;
      panelWake.hidden = true;
    }
    
    render();
    if ('Notification' in window && mode === 'wake') {
      reminderBtn.classList.add('visible');
    } else {
      reminderBtn.classList.remove('visible');
    }
  }

  modeWake.addEventListener('click', () => switchMode('wake'));
  modeSleep.addEventListener('click', () => switchMode('sleep'));

  function validateInput(input, max) {
    input.value = input.value.replace(/[^0-9]/g, '');
    if (input.value.length > 2) {
      input.value = input.value.slice(0, 2);
    }
    const val = parseInt(input.value);
    if (val > max) {
      input.value = pad(max);
    }
  }

  function formatInput(input) {
    const val = parseInt(input.value) || 0;
    input.value = pad(val);
  }

  hoursInput.addEventListener('input', () => {
    validateInput(hoursInput, 23);
    render();
  });
  hoursInput.addEventListener('blur', () => {
    formatInput(hoursInput);
    render();
  });

  minutesInput.addEventListener('input', () => {
    validateInput(minutesInput, 59);
    render();
  });
  minutesInput.addEventListener('blur', () => {
    formatInput(minutesInput);
    render();
  });
  
  document.querySelectorAll('.preset').forEach(btn => {
    btn.addEventListener('click', () => {
      hoursInput.value = pad(btn.dataset.h);
      minutesInput.value = pad(btn.dataset.m);
      render();
    });
  });

  function requestNotificationPermission() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  function setReminder(bedTimeTotal) {
    const now = new Date();
    const nowTotal = now.getHours() * 60 + now.getMinutes();
    let diff = bedTimeTotal - nowTotal;
    
    if (diff < 0) diff += 24 * 60;
    if (diff === 0) diff = 1;
    
    const reminderTime = 15;
    const delay = (diff - reminderTime) * 60 * 1000;
    
    if (delay < 0) {
      alert('Уже пора ложиться!');
      return;
    }
    
    if (reminderTimeout) {
      clearTimeout(reminderTimeout);
    }
    
    reminderTimeout = setTimeout(() => {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('🌙 Пора ложиться!', {
          body: 'Через 15 минут идеальное время для отхода ко сну',
          icon: iconDataUri,
          badge: iconDataUri
        });
      }
    }, delay);
    
    const reminderH = Math.floor(bedTimeTotal / 60);
    const reminderM = bedTimeTotal % 60;
    alert(`Напоминание установлено на ${pad(reminderH)}:${pad(reminderM)}`);
  }

  reminderBtn.addEventListener('click', () => {
    if ('Notification' in window) {
      if (Notification.permission === 'granted') {
        const bestOption = calcBedOptions(currentWakeTime.h, currentWakeTime.m)[0];
        setReminder(bestOption.timeTotal);
      } else if (Notification.permission !== 'denied') {
        Notification.requestPermission().then(permission => {
          if (permission === 'granted') {
            const bestOption = calcBedOptions(currentWakeTime.h, currentWakeTime.m)[0];
            setReminder(bestOption.timeTotal);
          }
        });
      } else {
        alert('Разрешите уведомления в настройках браузера');
      }
    } else {
      alert('Ваш браузер не поддерживает уведомления');
    }
  });

  if ('Notification' in window && currentMode === 'wake') {
    reminderBtn.classList.add('visible');
    requestNotificationPermission();
  }

  render();
  updateClock();
  setInterval(updateClock, 1000);
  setInterval(render, 60000);
</script>

</body>
</html>
